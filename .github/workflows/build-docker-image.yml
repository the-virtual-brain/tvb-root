name: Build and release tvb-run Docker images
on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight UTC

  workflow_dispatch: # Allow manual run
    inputs:
      tag:
        required: true
        type: string
        description: Tag with released version

  workflow_call: # Allow other GitHub workflows to call this
    inputs:
      tag:
        required: true
        type: string

env:
  DOCKER_IMAGE_NAME: thevirtualbrain/tvb-run
  DOCKER_EBRAINS_REGISTRY: https://docker-registry.ebrains.eu/v2
  DOCKER_IMAGE_NAME_EBRAINS: docker-registry.ebrains.eu/tvb/tvb-run

jobs:
  build:
    name: Build and Push Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

#      - name: Login to Docker Hub
#        uses: docker/login-action@v3
#        with:
#          username: ${{ secrets.DOCKER_HUB_USERNAME }}
#          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
#
#      - name: Login to EBRAINS Docker Registry
#        uses: docker/login-action@v3
#        with:
#          registry: ${{ env.DOCKER_EBRAINS_REGISTRY }}
#          username: ${{ secrets.EBRAINS_DOCKER_HUB_USERNAME }}
#          password: ${{ secrets.EBRAINS_DOCKER_HUB_PASSWORD }}

#      - name: Prepare tag for Docker image (compute an alfa tag)
#        id: get_tag
#        if: ${{ github.event_name == 'schedule' }}
#        run: echo "TAG=${{ github.ref_name }}.alfa" >> $GITHUB_OUTPUT

      - name: Prepare tag for Docker image (received as argument at release time)
        id: get_tag
        if: ${{ github.event_name == 'workflow_dispatch' }} # Should be workflow_call as described in docs
        run: echo "TAG=${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: tvb_build/docker
          file: tvb_build/docker/Dockerfile-run
          push: false
#          build-args: |
#            LAST_SHA=
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.get_tag.outputs.TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME_EBRAINS }}:${{ steps.get_tag.outputs.TAG }}
            
            
